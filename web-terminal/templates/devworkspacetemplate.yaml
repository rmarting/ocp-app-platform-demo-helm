# Override the operator-managed web-terminal-tooling template with a custom
# image that includes cosign, rekor-cli, and verify-image for TSSC demos.
# The unmanaged-state annotation prevents the operator from reverting to the
# default image on reconciliation.
---
apiVersion: workspace.devfile.io/v1alpha2
kind: DevWorkspaceTemplate
metadata:
  name: web-terminal-tooling
  namespace: openshift-operators
  annotations:
    controller.devfile.io/allow-import-from: "*"
    web-terminal.redhat.com/unmanaged-state: "true"
    argocd.argoproj.io/sync-options: Replace=true
  labels:
    console.openshift.io/terminal: "true"
spec:
  components:
    - name: web-terminal-tooling
      container:
        image: {{ .Values.tooling.image }}
        args:
          - tail
          - -f
          - /dev/null
        cpuLimit: 400m
        cpuRequest: 100m
        memoryLimit: 512Mi
        memoryRequest: 128Mi
        mountSources: false
        sourceMapping: /projects
