---
apiVersion: batch/v1
kind: Job
metadata:
  name: cosign-keygen
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: cosign-keygen
      restartPolicy: OnFailure
      containers:
        - name: cosign-keygen
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: VAULT_NAMESPACE
              value: {{ .Values.vault.namespace | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Wait for Vault to be ready
              echo "Waiting for Vault..."
              until oc exec vault-0 -n "$VAULT_NAMESPACE" -- vault status 2>/dev/null | grep -q "Sealed.*false"; do
                echo "Vault not ready, retrying in 10s..."
                sleep 10
              done
              echo "Vault is ready"

              # Check if keys already exist in Vault
              echo "Checking if cosign keys already exist in Vault..."
              EXISTING=$(oc exec vault-0 -n "$VAULT_NAMESPACE" -- vault kv get -field=value kv/secrets/rhtas/cosign-public-key 2>/dev/null)
              if [ -n "$EXISTING" ]; then
                echo "Cosign keys already exist in Vault, skipping"
                exit 0
              fi

              # Wait for cli-server to be ready
              echo "Waiting for cli-server..."
              until curl -sf http://cli-server.{{ .Values.namespace }}.svc:8080/clients/linux/cosign-amd64.gz -o /dev/null; do
                echo "cli-server not ready, retrying in 10s..."
                sleep 10
              done
              echo "cli-server is ready"

              # Download and install cosign
              echo "Downloading cosign..."
              curl -sL http://cli-server.{{ .Values.namespace }}.svc:8080/clients/linux/cosign-amd64.gz | gunzip > /tmp/cosign
              chmod +x /tmp/cosign

              # Generate key pair
              echo "Generating cosign key pair..."
              cd /tmp
              COSIGN_PASSWORD="" /tmp/cosign generate-key-pair

              PRIVATE_KEY=$(cat /tmp/cosign.key)
              PUBLIC_KEY=$(cat /tmp/cosign.pub)

              if [ -z "$PRIVATE_KEY" ] || [ -z "$PUBLIC_KEY" ]; then
                echo "ERROR: Failed to generate cosign key pair"
                exit 1
              fi

              # Store keys in Vault
              echo "Storing cosign keys in Vault..."
              oc exec vault-0 -n "$VAULT_NAMESPACE" -- vault kv put kv/secrets/rhtas/cosign-private-key value="$PRIVATE_KEY"
              oc exec vault-0 -n "$VAULT_NAMESPACE" -- vault kv put kv/secrets/rhtas/cosign-public-key value="$PUBLIC_KEY"

              echo "Cosign keys generated and stored in Vault successfully"
