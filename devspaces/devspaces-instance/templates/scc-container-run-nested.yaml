apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: container-run-nested
  annotations:
    {{- include "devspaces-instance.argocd-syncwave" . | nindent 4 }}
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false
allowedCapabilities:
  - SETUID
  - SETGID
defaultAddCapabilities: null
fsGroup:
  ranges:
    - max: 65534
      min: 1000
  type: MustRunAs
groups: []
priority: null
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - KILL
  - MKNOD
runAsUser:
  type: MustRunAs
  uid: 1000
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  ranges:
    - max: 65534
      min: 1000
  type: MustRunAs
userNamespaceLevel: AllowHostLevel
users: []
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
