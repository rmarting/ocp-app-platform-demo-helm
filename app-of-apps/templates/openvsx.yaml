apiVersion: argoproj.io/v1alpha1
kind: Application
{{ include "app-of-apps.metadata" (dict "name" .Values.openvsx.name "namespace" .Values.argocd.namespace "syncWave" "0") }}
spec:
  destination:
    namespace: {{ .Values.openvsx.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: openvsx
    repoURL: {{ .Values.gitops.repoURL }}
    targetRevision: {{ .Values.gitops.targetRevision }}
    helm:
      parameters:
        - name: build.git.uri
          value: {{ .Values.gitops.repoURL }}
        - name: build.git.ref
          value: {{ .Values.gitops.targetRevision }}
{{ include "app-of-apps.syncPolicy" . | indent 2 }}
