    gitlab:
      host: ""
    argocd:
      host: ""
    kubernetes:
      apiUrl: ""
    keycloak:
      host: ""
      realm: backstage
      loginRealm: backstage
  application:
    git:
      host: "github.com"
      group: redhat-ads-tech
      repo: ocp-app-platform-demo-developer-hub-config
      revision: main

rhdhGitops:
  name: rhdh-gitops
  namespace: rhdh-gitops
  password: ""

rhdh:
  name: backstage-bootstrap
  namespace: backstage
  configTemplate:
    gitlab:
      rootPassword: ""
      host: ""
    backstage:
      host: ""
    keycloak:
      host: ""
      realm: backstage
      loginRealm: backstage
      clientId: backstage-plugin
      clientSecret: ""
    gitops:
      host: ""
    kubernetes:
      api: ""
    cluster:
      subdomain: ""
  application:
    gitops:
      namespace: openshift-gitops
    helm:
      version: 1.8.2
      values:
        git:
          host: ""

