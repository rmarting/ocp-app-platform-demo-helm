{{- range $env := .Values.securedEnvironments }}
---
apiVersion: v1
kind: Service
metadata:
  name: parasol-db
  namespace: {{ $env.namespace }}
  labels:
    app: parasol-db
spec:
  ports:
    - name: postgresql
      protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app: parasol-db
{{- end }}
