keycloak:
  name: keycloak

realm:
  name: backstage

hook:
  image:
    repository: quay.io/cloud-architecture-workshop/wait-for-statefulset-job
    pullPolicy: IfNotPresent
    tag: "1c68180"
  serviceAccount:
    create: true
    name: ""
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  maxTimeToWait: 120000

users:
  users:
    - id: dev1
      firstName: Dave
      lastName: Developer
      avatar: https://api.dicebear.com/9.x/personas/svg?seed=Dave
      groups:
        - developers
        - devteam1
    - id: dev2
      firstName: Divya
      lastName: Developer
      avatar: https://api.dicebear.com/9.x/personas/svg?seed=Divya
      groups:
        - developers
        - devteam1
    - id: pe1
      firstName: Paul
      lastName: PlatEngineer
      avatar: https://api.dicebear.com/9.x/personas/svg?seed=Paul
      groups:
        - platformengineers
        - rhdh
    - id: pe2
      firstName: Priya
      lastName: PlatEngineer
      avatar: https://api.dicebear.com/9.x/personas/svg?seed=Priya
      groups:
        - platformengineers
        - rhdh
    - id: pipeline
      firstName: pipeline
      lastName: service
      groups:
        - infrastructure
  password:

groups:
  - name: developers
  - name: devteam1
  - name: platformengineers
  - name: rhdh
  - name: infrastructure

client:
  backstage:
    name:
    redirectUri:
    webOrigin:
    secret:
  backstagePlugin:
    name:
    redirectUri:
    webOrigin:
    secret:
  openshift:
    name: openshift
    redirectUri: ""
    secret:
  trustedartifactsigner:
    name: trusted-artifact-signer
    redirectUri:
      - urn:ietf:wg:oauth:2.0:oob
      - "*"
  tpaFrontend:
    name: tpa-frontend
    redirectUri: []
  tpaCli:
    name: tpa-cli
    secret:

argocd:
  enabled: true
  syncwave: "-1"

