---
apiVersion: v1
kind: Secret
metadata:
  name: open-vsx-pg
  labels:
    {{- include "openvsx.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque
stringData:
  database-user: {{ .Values.postgresql.username }}
  database-password: {{ .Values.postgresql.password }}
  database-name: {{ .Values.postgresql.database }}
