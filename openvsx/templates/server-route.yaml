---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: open-vsx-server
  labels:
    {{- include "openvsx.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  to:
    kind: Service
    name: open-vsx-server
    weight: 100
  port:
    targetPort: {{ .Values.server.port }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
