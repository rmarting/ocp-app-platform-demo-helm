nameOverride: ""

postgresql:
  image: quay.io/sclorg/postgresql-15-c9s:c9s
  replicas: 1
  port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    size: 5Gi
  database: openvsx
  username: openvsx
  password: openvsx

server:
  version: v0.30.0
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 3Gi
  persistence:
    size: 10Gi

build:
  git:
    # Overridden by app-of-apps to match gitops.repoURL and targetRevision
    uri: "https://github.com/redhat-ads-tech/ocp-app-platform-demo-helm.git"
    ref: "dev"
    contextDir: openvsx/open-vsx-server

extensionUpload:
  enabled: true
  image: registry.access.redhat.com/ubi9/nodejs-20:latest
