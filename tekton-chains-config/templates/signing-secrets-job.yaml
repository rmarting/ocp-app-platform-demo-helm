# The "signing-secrets" secret is owned by the Tekton operator
# (TektonInstallerSet) and cannot be managed declaratively via Helm — the
# operator would overwrite our changes. This Job patches it imperatively
# after the operator has finished setting up Chains, populating it with the
# cosign keys generated by the RHTAS cosign-keygen job and stored in Vault.
#
# Note: Chains authenticates to OCI registries using the TaskRun's SA, not
# the controller's SA. Registry push credentials (quay-push-secret) must be
# linked to the "pipeline" SA in each build namespace — this is handled in
# the application manifests repos, not here.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chains-signing-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chains-signing-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
rules:
  - apiGroups: ["operator.tekton.dev"]
    resources: ["tektonchains"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chains-signing-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chains-signing-secrets
subjects:
  - kind: ServiceAccount
    name: chains-signing-secrets
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: chains-signing-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  backoffLimit: 30
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: chains-signing-secrets
      containers:
        - name: signing-secrets
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: VAULT_NAMESPACE
              value: {{ .Values.vault.namespace | quote }}
            - name: CHAINS_NAMESPACE
              value: {{ .Values.chainsNamespace | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              # Wait for TektonChain to be ready
              echo "Waiting for TektonChain to be ready..."
              until [ "$(oc get tektonchain chain -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)" = "True" ]; do
                echo "TektonChain not ready, retrying in 10s..."
                sleep 10
              done
              echo "TektonChain is ready"

              # Wait for signing-secrets to exist
              echo "Waiting for signing-secrets..."
              until oc get secret signing-secrets -n "$CHAINS_NAMESPACE" > /dev/null 2>&1; do
                echo "signing-secrets not found, retrying in 10s..."
                sleep 10
              done
              echo "signing-secrets exists"

              # Wait for Vault KV engine to be ready (vault-setup job must have
              # finished enabling KV v2 and logging in with the root token)
              echo "Waiting for Vault..."
              until oc exec vault-0 -n "$VAULT_NAMESPACE" -- vault kv list kv/secrets 2>/dev/null; do
                echo "Vault KV engine not ready, retrying in 10s..."
                sleep 10
              done
              echo "Vault is ready"

              # Read cosign keys from Vault
              echo "Reading cosign keys from Vault..."
              PRIVATE_KEY=$(oc exec vault-0 -n "$VAULT_NAMESPACE" -- vault kv get -field=value kv/secrets/rhtas/cosign-private-key 2>/dev/null)
              PUBLIC_KEY=$(oc exec vault-0 -n "$VAULT_NAMESPACE" -- vault kv get -field=value kv/secrets/rhtas/cosign-public-key 2>/dev/null)

              if [ -z "$PRIVATE_KEY" ] || [ -z "$PUBLIC_KEY" ]; then
                echo "ERROR: Cosign keys not found in Vault (RHTAS cosign-keygen job may not have run yet)"
                exit 1
              fi
              echo "Cosign keys retrieved from Vault"

              # Compare with existing signing-secrets
              PRIVATE_KEY_B64=$(echo -n "$PRIVATE_KEY" | base64 -w 0)
              PUBLIC_KEY_B64=$(echo -n "$PUBLIC_KEY" | base64 -w 0)

              EXISTING_KEY=$(oc get secret signing-secrets -n "$CHAINS_NAMESPACE" -o jsonpath='{.data.cosign\.key}' 2>/dev/null)
              EXISTING_PUB=$(oc get secret signing-secrets -n "$CHAINS_NAMESPACE" -o jsonpath='{.data.cosign\.pub}' 2>/dev/null)

              NEEDS_RESTART=false

              if [ "$EXISTING_KEY" = "$PRIVATE_KEY_B64" ] && [ "$EXISTING_PUB" = "$PUBLIC_KEY_B64" ]; then
                echo "signing-secrets already contains the correct cosign keys, no changes needed"
              else
                echo "Patching signing-secrets..."
                PASSWORD_B64=$(echo -n "" | base64 -w 0)

                oc patch secret signing-secrets -n "$CHAINS_NAMESPACE" \
                  -p "{\"data\":{\"cosign.key\":\"${PRIVATE_KEY_B64}\",\"cosign.pub\":\"${PUBLIC_KEY_B64}\",\"cosign.password\":\"${PASSWORD_B64}\"}}"

                echo "signing-secrets patched"
                NEEDS_RESTART=true
              fi

              if [ "$NEEDS_RESTART" = "true" ]; then
                echo "Restarting chains controller..."
                oc rollout restart deployment tekton-chains-controller -n "$CHAINS_NAMESPACE"
                oc rollout status deployment tekton-chains-controller -n "$CHAINS_NAMESPACE" --timeout=120s
                echo "Tekton Chains configured successfully"
              else
                echo "No changes needed, skipping controller restart"
              fi
