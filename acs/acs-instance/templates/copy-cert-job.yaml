---
apiVersion: batch/v1
kind: Job
metadata:
  name: copy-ingress-cert
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: copy-ingress-cert
      restartPolicy: OnFailure
      containers:
        - name: copy-cert
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Copying default ingress certificate to stackrox namespace..."

              # Check if the target secret already exists
              if oc get secret central-default-tls-cert -n stackrox &>/dev/null; then
                echo "Secret central-default-tls-cert already exists, skipping"
                exit 0
              fi

              # Discover the cert secret name from the router-default deployment
              SECRET_NAME=$(oc get deployment router-default -n openshift-ingress \
                -o jsonpath='{.spec.template.spec.volumes[?(@.name=="default-certificate")].secret.secretName}')

              if [ -z "$SECRET_NAME" ]; then
                echo "ERROR: Could not determine default certificate secret from router-default deployment"
                exit 1
              fi

              echo "Found ingress certificate secret: ${SECRET_NAME}"

              # Read the certificate from the discovered secret
              TLS_CRT=$(oc get secret "${SECRET_NAME}" -n openshift-ingress -o jsonpath='{.data.tls\.crt}')
              TLS_KEY=$(oc get secret "${SECRET_NAME}" -n openshift-ingress -o jsonpath='{.data.tls\.key}')

              if [ -z "$TLS_CRT" ] || [ -z "$TLS_KEY" ]; then
                echo "ERROR: Could not read certificate data from secret ${SECRET_NAME} in openshift-ingress"
                exit 1
              fi

              # Create the TLS secret in stackrox namespace
              oc create secret tls central-default-tls-cert \
                --cert=<(echo "$TLS_CRT" | base64 -d) \
                --key=<(echo "$TLS_KEY" | base64 -d) \
                -n stackrox

              echo "Certificate copied successfully"
